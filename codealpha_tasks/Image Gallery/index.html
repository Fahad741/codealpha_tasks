<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Modern Image Gallery</title>

 
  <link rel="stylesheet" href="style.css">

  
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

  <!-- HEADER -->
  <header>

    <h1>Modern Image Gallery</h1>

    <p>Responsive Gallery with Lightbox & Filters</p>

  </header>

  <!-- FILTER BUTTONS -->
  <div class="filter-buttons">

    <button class="active" data-filter="all">
      All
    </button>

    <button data-filter="nature">
      Nature
    </button>

    <button data-filter="city">
      City
    </button>

    <button data-filter="animals">
      Animals
    </button>

  </div>

  <!-- GALLERY -->
  <div class="gallery">

    <!-- NATURE -->
    <div class="gallery-item nature">
      <img src="nature1.jpg" alt="">
    </div>

    <div class="gallery-item nature">
      <img src="nature2.jpg" alt="">
    </div>

    <div class="gallery-item nature">
      <img src="nature3.jpg" alt="">
    </div>

    <!-- CITY -->
    <div class="gallery-item city">
      <img src="city.jpg" alt="">
    </div>

    <div class="gallery-item city">
      <img src="city2.jpg" alt="">
    </div>

    <!-- ANIMALS -->
    <div class="gallery-item animals">
      <img src="animal1.jpg" alt="">
    </div>

    <div class="gallery-item animals">
      <img src="animal2.jpg" alt="">
    </div>

  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox">

    <span class="close-btn">
      &times;
    </span>

    <button class="prev">
      <i class="fa-solid fa-chevron-left"></i>
    </button>

    <img class="lightbox-img">

    <button class="next">
      <i class="fa-solid fa-chevron-right"></i>
    </button>

  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
